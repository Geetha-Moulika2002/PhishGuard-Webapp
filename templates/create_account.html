<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    font-family:Arial,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

.card{

    width:500px;

    background:#0f172a;

    padding:40px;

    border-radius:20px;

    border:1px solid #1e293b;

    box-shadow:
    0 0 20px rgba(59,130,246,0.15);
}

h1{

    text-align:center;
    color:#3b82f6;

    margin-bottom:30px;
}

input{

    width:100%;

    padding:14px;

    margin-bottom:18px;

    background:#020617;

    border:1px solid #334155;

    border-radius:12px;

    color:white;
}

button{

    width:100%;

    padding:14px;

    background:#2563eb;

    border:none;

    border-radius:12px;

    color:white;

    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.login-link{

    text-align:center;

    margin-top:20px;
}

.login-link a{

    color:#38bdf8;

    text-decoration:none;
}

</style>

</head>

<body>

<form method="POST">

<div class="card">

    <h1>🛡️ Create Account</h1>

    <input
        type="text"
        name="name"
        placeholder="Full Name"
        required>

    <input
        type="email"
        name="email"
        placeholder="Email Address"
        required>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <input
        type="password"
        name="confirm_password"
        placeholder="Confirm Password"
        required>

    <button type="submit">

        Create Account

    </button>

    <div class="login-link">

        <a href="/login">

            Already have an account? Login

        </a>

    </div>

</div>

</form>

</body>
</html>
