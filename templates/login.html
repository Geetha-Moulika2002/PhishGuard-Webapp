<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>PhishGuard Login</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{

        background:#020617;
        font-family:Arial, sans-serif;

        display:flex;
        justify-content:center;
        align-items:center;

        height:100vh;
    }

    .login-card{

        width:450px;

        background:#0f172a;

        padding:40px;

        border-radius:20px;

        border:1px solid #1e293b;

        box-shadow:
        0 0 20px rgba(59,130,246,0.15);
    }

    .logo{

        text-align:center;

        color:#3b82f6;

        font-size:34px;

        margin-bottom:15px;
    }

    .title{

        text-align:center;

        color:white;

        font-size:28px;

        margin-bottom:10px;
    }

    .subtitle{

        text-align:center;

        color:#94a3b8;

        margin-bottom:35px;

        line-height:1.5;
    }

    label{

        color:white;

        display:block;

        margin-bottom:8px;
    }

    input[type="email"],
    input[type="password"]{

        width:100%;

        padding:14px;

        background:#020617;

        border:1px solid #334155;

        border-radius:12px;

        color:white;

        margin-bottom:20px;
    }

    input:focus{

        outline:none;

        border:1px solid #3b82f6;
    }

    .options{

        display:flex;

        justify-content:space-between;

        align-items:center;

        color:#94a3b8;

        font-size:14px;

        margin-bottom:25px;
    }

    button{

        width:100%;

        padding:14px;

        background:#2563eb;

        border:none;

        border-radius:12px;

        color:white;

        font-size:16px;

        cursor:pointer;
    }

    button:hover{

        background:#1d4ed8;
    }

    .footer{

        margin-top:25px;

        text-align:center;

        color:#64748b;

        font-size:13px;
    }

</style>
```

</head>

<body>

<form method="POST">

```
<div class="login-card">

    <div class="logo">
        🛡️
    </div>

    <div class="title">
        PhishGuard
    </div>

    <div class="subtitle">

        AI-Powered SMS Phishing Detection Platform

    </div>

    <label>Email Address</label>

    <input
        type="email"
        name="email"
        placeholder="Enter your email"
        required>

    <label>Password</label>

    <input
        type="password"
        name="password"
        placeholder="Enter your password"
        required>

    <div class="options">

        <label>

            <input type="checkbox">

            Remember Me

        </label>

        <span>
            Forgot Password?
        </span>

    </div>

    <button type="submit">

        Login

    </button>

    <div class="footer">

    NLP • TF-IDF • SVM • BiLSTM • Attention

    <br><br>

    <a
        href="/create-account"
        style="color:#38bdf8;text-decoration:none;">

        Create Account

    </a>

</div>

</div>


</form>

</body>
</html>
